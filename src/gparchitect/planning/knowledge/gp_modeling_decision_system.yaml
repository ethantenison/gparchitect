    - object_type: model_family
      canonical_name: MultiTaskGP
      aliases:
        - exact_correlated_task_gp
      implementation_mapping:
        gpytorch_class: botorch.models.MultiTaskGP
        botorch_usage:
          - exact multitask GP with long-format task indicator
        gparchitect_schema_mapping:
          model_class: MultiTaskGP
          schema_fields:
            required:
              - model_class
              - feature_groups
              - input_dim
              - output_dim
              - task_feature_index
              - task_values
            optional:
              - multitask_rank
              - mean
              - output_means
              - noise
              - execution
              - group_composition
      required_args:
        - model_class=MultiTaskGP
        - task_feature_index
        - task_values
      optional_args:
        - multitask_rank
        - output_means
        - mean
        - noise
      supported_contexts:
        correlated_tasks: preferred
        long_format_task_indicator: required
      composition_compatibility:
        - all supported kernel compositions on non-task features
      mathematical_role:
        - exact GP with learned inter-task covariance
      modeling_assumptions:
        - outputs/tasks share latent structure worth borrowing
        - data can be represented in long format with task indicator
        - cross-task dependence is non-negligible
      observable_evidence_for_use:
        data_patterns:
          - related outputs with shared dynamics
          - some tasks data-poor, others richer
        domain_language_cues:
          - tasks are related
          - machines behave similarly
          - outputs are correlated
        experimental_signals:
          - aligned or overlapping inputs across tasks
          - task indicator available
        example_user_statements:
          - "different machines behave similarly"
          - "the outputs are correlated and one task has little data"
      exclusion_rules:
        anti_patterns:
          - semantically unrelated outputs
          - outputs with disjoint noncomparable input support
        invalid_conditions:
          - missing task indicator
          - task_values unspecified or inconsistent with observed data
        diagnostic_failures:
          - multitask fit gives no gain over independent baselines
          - inferred coupling harms calibration for some tasks
      hyperparameter_semantics:
        - parameter: multitask_rank
          meaning: rank of inter-task covariance
          effect_if_increased: richer task correlation structure
          effect_if_decreased: simpler shared structure, stronger regularization
      interaction_effects:
        kernels:
          - shared data kernel across tasks
        means:
          - shared or task-specific means available
        priors:
          - regularization more important when rank or data scarcity increases
        multitask:
          - core family mechanism is output correlation
        normalization:
          - input scaling still applies to continuous features
      composition_patterns:
        - pattern: correlated_multitask_exact_gp
          description: exact multitask model with shared latent structure
          when_to_use:
            - related tasks and long-format data
          when_not_to_use:
            - independent outputs
      model_routing_implications:
        suggests:
          - MultiTaskGP
        why:
          - only supported exact family in GPArchitect that models cross-task covariance directly
        constraints:
          - requires explicit task column and task_values
          - current GPArchitect support is long-format with one observed output column
      diagnostics_and_revision_rules:
        checks:
          - compare against ModelListGP or independent baselines
          - inspect per-task calibration
          - inspect effect of multitask_rank
        failure_symptoms:
          - negative transfer across tasks
          - no predictive-density gain
          - task mismatch errors during build
        fixes:
          - reduce multitask_rank
          - switch to ModelListGP if dependence is weak
          - verify task encoding and task_values
      decision_triggers:
        IF THEN:
          - IF outputs are correlated AND share inputs/support AND long-format task indicator exists THEN choose MultiTaskGP
        counterfactual_checks:
          - IF independent models perform as well or better AND borrowing strength is not helping THEN do not use MultiTaskGP
      evidence_strength:
        theoretical: strong
        empirical_library_support: strong
        heuristic_elements:
          - practical value of shared strength must be confirmed by comparison to independent baselines
      citations:
        - https://archive.botorch.org/v/0.8.3/api/models.html
        - https://github.com/ethantenison/gparchitect/
        - https://docs.gpytorch.ai/en/stable/examples/03_Multitask_Exact_GPs/index.html
      concise_agent_summary:
        - use only when related tasks and long-format task encoding exist
        - reject when outputs are independent or task encoding absent
      schema_ready_example:
        model_class: MultiTaskGP
        input_dim: 3
        output_dim: 1
        task_feature_index: 2
        task_values:
          - 0
          - 1
        multitask_rank: 1
        feature_groups:
          - name: shared_inputs
            feature_indices:
              - 0
              - 1
            kernel:
              kernel_type: Matern52
              ard: true

