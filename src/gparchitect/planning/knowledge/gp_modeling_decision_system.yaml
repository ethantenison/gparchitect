      implementation_mapping:
        gpytorch_class: gpytorch.means.LinearMean
        botorch_usage:
          - mean_module in SingleTaskGP
          - mean_module in ModelListGP submodels
          - shared or task-specific mean in MultiTaskGP
        gparchitect_schema_mapping:
          mean_type: Linear
          schema_fields:
            required:
              - mean_type
      required_args:
        - mean_type=Linear
      optional_args: []
      supported_contexts:
        shared_mean: supported
        output_specific_mean: supported
        task_specific_mean: supported
      composition_compatibility:
        - compatible with all kernel structures
      mathematical_role:
        - deterministic linear trend component
      modeling_assumptions:
        - at least part of the signal is approximately linear in active inputs
        - kernel should focus on residual structure rather than absorbing trend
      observable_evidence_for_use:
        data_patterns:
          - monotonic or approximately linear drift
          - residual structure remains after line fit
        domain_language_cues:
          - trend
          - drift
          - slope
          - monotonic
        experimental_signals:
          - directional effect consistently visible across range
        example_user_statements:
          - "there is an upward trend plus local deviations"
      exclusion_rules:
        anti_patterns:
          - strongly nonlinear deterministic mean
          - no discernible directional trend
        invalid_conditions:
          - using linear mean to encode strict monotonicity guarantee
        diagnostic_failures:
          - residual curvature remains substantial
          - fit improves only when kernel compensates for misfit mean
      hyperparameter_semantics:
        - parameter: weights
          meaning: linear effect per input dimension
          effect_if_increased: stronger positive trend in corresponding dimension
          effect_if_decreased: weaker or negative trend
        - parameter: bias
          meaning: intercept term
          effect_if_increased: higher baseline
          effect_if_decreased: lower baseline
      interaction_effects:
        kernels:
          - pairs well with stationary residual kernels
        means:
          - preferred over constant/zero when directional trend exists
        priors:
          - no explicit mean prior slot in current contract
        multitask:
          - task-specific linear means possible through output_means
        normalization:
          - min-max scaling changes interpretation of weights but improves stability
      composition_patterns:
        - pattern: linear_mean_plus_smooth_residual
          description: deterministic trend separated from GP residual
          when_to_use:
            - monotonic trend with local structure
          when_not_to_use:
            - no directional signal
      model_routing_implications:
        suggests:
          - SingleTaskGP
          - MultiTaskGP
          - ModelListGP
        why:
          - mean structure independent of output-family choice
        constraints:
          - task-specific overrides require explicit task_values for MultiTaskGP
      diagnostics_and_revision_rules:
        checks:
          - residuals versus key trend covariate
          - compare to Constant mean baseline
        failure_symptoms:
          - residual trend remains
          - posterior mean misses curvature due to overly rigid mean
        fixes:
          - keep linear mean and adjust kernel
          - revert to Constant if trend not supported
      decision_triggers:
        IF THEN:
          - IF domain language indicates monotonic trend or drift THEN choose Linear mean before complicating kernel
        counterfactual_checks:
          - IF Constant mean plus smooth kernel performs equally well THEN deterministic trend assumption may be unnecessary
      evidence_strength:
        theoretical: strong
        empirical_library_support: strong
        heuristic_elements:
          - mapping monotonic language to linear mean is approximate, not a strict monotonic constraint
      citations:
        - https://github.com/ethantenison/gparchitect/
        - https://archive.botorch.org/v/0.8.3/api/models.html
      concise_agent_summary:
        - use for directional trend, then model residuals with kernel
        - reject when nonlinear mean dominates
      schema_ready_example:
        mean_type: Linear

    - object_type: model_family
