  decision_graph:
    - node: number_of_outputs
      condition: IF output_dim == 1 THEN single-output-path ELSE multi-output-path
      decision: IF output_dim == 1 THEN SingleTaskGP ELSE evaluate_correlation_between_outputs
      rationale: IF one target only THEN multi-output structure is unnecessary ELSE output coupling decision is required

    - node: shared_inputs
      condition: IF output_dim == 1 AND all observations use the same input feature set THEN choose_single_task ELSE choose_single_task
      decision: IF output_dim == 1 THEN SingleTaskGP ELSE evaluate_data_density
      rationale: IF one target only THEN GPArchitect exact regression route is SingleTaskGP

    - node: data_density
      condition: IF output_dim > 1 AND observations are in long format with one observed output column plus a task indicator column AND per-task sample size is low-to-moderate THEN evaluate_domain_coupling_knowledge ELSE evaluate_shared_inputs
      decision: IF long_format_with_task_indicator == true THEN evaluate_domain_coupling_knowledge ELSE evaluate_shared_inputs
      rationale: IF MultiTaskGP candidate format is absent THEN disqualify MultiTaskGP ELSE retain MultiTaskGP as candidate

    - node: shared_inputs
      condition: IF output_dim > 1 AND all outputs are observed on the same or substantially overlapping input design THEN evaluate_correlation_between_outputs ELSE choose_ModelListGP
      decision: IF shared_or_overlapping_inputs == true THEN evaluate_correlation_between_outputs ELSE ModelListGP
      rationale: IF outputs do not share aligned design support THEN disqualify MultiTaskGP and joint independent batched modeling; choose separate submodels

    - node: correlation_between_outputs
      condition: IF output_dim > 1 AND cross-output correlation is expected or observed AND is not negligible THEN evaluate_domain_coupling_knowledge ELSE evaluate_noise_characteristics
      decision: IF correlated_outputs == true THEN evaluate_domain_coupling_knowledge ELSE evaluate_noise_characteristics
      rationale: IF outputs are effectively independent THEN do not pay coupling complexity cost

    - node: domain_coupling_knowledge
      condition: IF outputs share mechanism, physics, task family, or hierarchical relatedness AND borrowing strength is desirable THEN evaluate_noise_characteristics ELSE choose_ModelListGP
      decision: IF shared_latent_structure == true THEN evaluate_noise_characteristics ELSE ModelListGP
      rationale: IF domain does not support shared latent structure THEN disqualify MultiTaskGP even when empirical correlation exists

    - node: noise_characteristics
      condition: IF output_dim > 1 AND correlated_outputs == true AND shared_latent_structure == true AND noise is not so output-specific or structurally mismatched that shared multitask fitting becomes misleading THEN choose_MultiTaskGP ELSE choose_ModelListGP
      decision: IF multitask_noise_mismatch_is_not_dominant == true THEN MultiTaskGP ELSE ModelListGP
      rationale: IF cross-output structure is useful and not dominated by incompatible noise patterns THEN choose shared multitask model ELSE prefer independent submodels

    - node: noise_characteristics
      condition: IF output_dim > 1 AND correlated_outputs == false THEN choose_independent_multi_output_models ELSE terminate_prior_branch
      decision: IF correlated_outputs == false THEN Independent multi-output models ELSE ModelListGP
      rationale: IF outputs are independent THEN direct independent fits are preferred

    - node: independent_multi_output_models
      condition: IF output_dim > 1 AND independent outputs should still be managed as one BoTorch container THEN choose_ModelListGP ELSE choose_independent_multi_output_models
      decision: IF containerized_independent_outputs_needed == true THEN ModelListGP ELSE Independent multi-output models
      rationale: IF orchestration convenience is required THEN choose ModelListGP ELSE separate independent models are sufficient

    - node: final_single_output
      condition: IF output_dim == 1 AND target is continuous under exact Gaussian regression assumptions THEN choose_SingleTaskGP ELSE choose_SingleTaskGP
      decision: IF output_dim == 1 THEN SingleTaskGP ELSE SingleTaskGP
      rationale: IF current GPArchitect contract is followed for single-output regression THEN SingleTaskGP is the terminal choice

    - node: disqualifier_multitask_missing_task_index
      condition: IF output_dim > 1 AND task_feature_index is missing THEN do_not_choose_MultiTaskGP
      decision: IF task_feature_index_missing == true THEN ModelListGP ELSE continue_multitask_path
      rationale: IF GPArchitect multitask contract cannot be satisfied THEN disqualify MultiTaskGP

    - node: disqualifier_multitask_missing_task_values
      condition: IF output_dim > 1 AND task_values are missing or inconsistent with observed task labels THEN do_not_choose_MultiTaskGP
      decision: IF task_values_invalid == true THEN ModelListGP ELSE continue_multitask_path
      rationale: IF explicit task domain is unavailable THEN disqualify MultiTaskGP

    - node: disqualifier_independent_outputs_with_shared_signal
      condition: IF outputs are sparse per task AND strong shared structure exists AND aligned design is available THEN do_not_choose_Independent_multi_output_models
      decision: IF sparse_tasks_and_shared_structure == true THEN MultiTaskGP ELSE Independent multi-output models
      rationale: IF borrowing strength is materially valuable THEN disqualify purely independent fits

    - node: disqualifier_modellist_for_strong_coupling
      condition: IF strong cross-output dependence is central to the problem AND long-format task encoding is available THEN do_not_choose_ModelListGP
      decision: IF strong_coupling_and_valid_multitask_format == true THEN MultiTaskGP ELSE ModelListGP
      rationale: IF independence assumption is substantively wrong THEN disqualify ModelListGP

  templates:
    - name: trend_plus_residual
      structure:
        model_family: SingleTaskGP
        mean:
          mean_type: Linear
        feature_groups:
          - name: residual_inputs
            feature_indices:
              - 0
              - 1
            kernel:
              kernel_type: Matern52
              ard: true
        group_composition: additive
        noise:
          fixed: false
        execution:
          input_scaling: true
          outcome_standardization: true
      when_to_use:
        - deterministic global trend is expected
        - residual deviations around trend remain smooth
        - a linear baseline is easier to defend than forcing the kernel to absorb trend
      required_evidence:
        - response changes monotonically or approximately linearly with at least one covariate
        - residual plots after detrending still show structured smooth variation
        - domain language includes trend, baseline, drift, or slope
      failure_cases:
        - nonlinear global trend remains in residuals and posterior mean underfits
        - residual process is rough or discontinuous and Matern52 oversmooths
        - strong periodicity remains unexplained after fit
      disqualifiers:
        - no defensible trend signal
        - abrupt regime changes dominate
        - output is primarily periodic rather than trend-driven
      DSL_example:
        model_class: SingleTaskGP
        input_dim: 2
        output_dim: 1
        mean:
          mean_type: Linear
        feature_groups:
          - name: residual_inputs
            feature_indices:
              - 0
              - 1
            kernel:
              kernel_type: Matern52
              ard: true
        group_composition: additive
        noise:
          fixed: false
        execution:
          input_scaling: true
          outcome_standardization: true

    - name: periodic_plus_smooth_variation
      structure:
        model_family: SingleTaskGP
        mean:
          mean_type: Constant
        feature_groups:
          - name: time_signal
            feature_indices:
              - 0
            kernel:
              kernel_type: RBF
              composition: multiplicative
              children:
                - kernel_type: Periodic
                  period_length: 12.0
                  ard: false
                - kernel_type: RBF
                  ard: false
        group_composition: additive
        noise:
          fixed: false
        execution:
          input_scaling: true
          outcome_standardization: true
      when_to_use:
        - repeating cycle is present
        - cycle is smooth within each period
        - nonperiodic smooth deviation around periodic structure is expected
      required_evidence:
        - explicit time or phase feature exists
        - known or estimable stable period
        - repeated peaks and troughs across multiple cycles
      failure_cases:
        - period is unstable or drifting
        - one-off events are mistaken for seasonality
        - amplitude modulation or trend dominates and remains in residuals
      disqualifiers:
        - no time-like covariate
        - fewer than roughly two effective cycles in training support
        - regime breaks overwhelm periodic recurrence
      DSL_example:
        model_class: SingleTaskGP
        input_dim: 1
        output_dim: 1
        mean:
          mean_type: Constant
        feature_groups:
          - name: time_signal
            feature_indices:
              - 0
            kernel:
              kernel_type: RBF
              composition: multiplicative
              children:
                - kernel_type: Periodic
                  period_length: 12.0
                - kernel_type: RBF
        group_composition: additive
        noise:
          fixed: false
        execution:
          input_scaling: true
          outcome_standardization: true

    - name: additive_independent_processes
      structure:
        model_family: SingleTaskGP
        mean:
          mean_type: Constant
        feature_groups:
          - name: block_a
            feature_indices:
              - 0
              - 1
            kernel:
              kernel_type: Matern52
              ard: true
          - name: block_b
            feature_indices:
              - 2
            kernel:
              kernel_type: RBF
              ard: false
        group_composition: additive
        noise:
          fixed: false
        execution:
          input_scaling: true
          outcome_standardization: true
      when_to_use:
        - inputs belong to distinct mechanisms
        - effects are approximately additive rather than strongly interactive
        - interpretability by component matters
      required_evidence:
        - defensible partition of feature groups
        - additive language such as independent drivers or separate contributions
        - interaction diagnostics do not dominate
      failure_cases:
        - strong cross-group interaction remains in residuals
        - wrong feature grouping causes unstable attribution
        - one block absorbs variation belonging to another
      disqualifiers:
        - main predictive effect is interaction-driven
        - no meaningful feature partition exists
        - sample size is too small for multiple flexible blocks
      DSL_example:
        model_class: SingleTaskGP
        input_dim: 3
        output_dim: 1
        mean:
          mean_type: Constant
        feature_groups:
          - name: block_a
            feature_indices:
              - 0
              - 1
            kernel:
              kernel_type: Matern52
              ard: true
          - name: block_b
            feature_indices:
              - 2
            kernel:
              kernel_type: RBF
        group_composition: additive
        noise:
          fixed: false
        execution:
          input_scaling: true
          outcome_standardization: true

    - name: correlated_multitask_outputs
      structure:
        model_family: MultiTaskGP
        mean:
          mean_type: Constant
        output_means:
          0:
            mean_type: Constant
          1:
            mean_type: Constant
        feature_groups:
          - name: shared_inputs
            feature_indices:
              - 0
              - 1
            kernel:
              kernel_type: Matern52
              ard: true
        task_feature_index: 2
        task_values:
          - 0
          - 1
        multitask_rank: 1
        group_composition: additive
        noise:
          fixed: false
        execution:
          input_scaling: true
          outcome_standardization: true
      when_to_use:
        - outputs are related
        - shared latent structure is expected
        - some tasks can benefit from borrowing strength from others
      required_evidence:
        - long-format data with task indicator column
        - non-negligible cross-task dependence
        - domain rationale for shared mechanism
      failure_cases:
        - negative transfer across tasks
        - task-specific behavior dominates shared structure
        - no predictive gain over independent baselines
      disqualifiers:
        - outputs are independent or unrelated
        - task indicator is missing
        - task_values cannot be enumerated consistently
      DSL_example:
        model_class: MultiTaskGP
        input_dim: 3
        output_dim: 1
        mean:
          mean_type: Constant
        output_means:
          0:
            mean_type: Constant
          1:
            mean_type: Constant
        feature_groups:
          - name: shared_inputs
            feature_indices:
              - 0
              - 1
            kernel:
              kernel_type: Matern52
              ard: true
        task_feature_index: 2
        task_values:
          - 0
          - 1
        multitask_rank: 1
        group_composition: additive
        noise:
          fixed: false
        execution:
          input_scaling: true
          outcome_standardization: true

    - name: low_data_strong_prior_model
      structure:
        model_family: SingleTaskGP
        mean:
          mean_type: Constant
        feature_groups:
          - name: all_inputs
            feature_indices:
              - 0
              - 1
            kernel:
              kernel_type: Matern52
              ard: true
              lengthscale_prior:
                distribution: LogNormal
                params:
                  loc: 0.0
                  scale: 0.4
              outputscale_prior:
                distribution: Gamma
                params:
                  concentration: 2.0
                  rate: 1.0
        group_composition: additive
        noise:
          fixed: false
          prior:
            distribution: Gamma
            params:
              concentration: 2.0
              rate: 5.0
        execution:
          input_scaling: true
          outcome_standardization: true
      when_to_use:
        - sample size is small
        - domain knowledge about smoothness and noise is available
        - agent must reduce overfitting and unstable hyperparameter search
      required_evidence:
        - limited observations relative to input flexibility
        - defendable prior beliefs on lengthscale, signal amplitude, or noise
        - no strong evidence requiring highly expressive kernel structure
      failure_cases:
        - priors dominate posterior and suppress genuine signal
        - prior centers are misaligned with scaled data
        - model underfits due to overly strong shrinkage
      disqualifiers:
        - no defensible prior calibration
        - high-dimensional sparse input space with weak signal
        - dominant discontinuity or regime change unsupported by stationary kernel
      DSL_example:
        model_class: SingleTaskGP
        input_dim: 2
        output_dim: 1
        mean:
          mean_type: Constant
        feature_groups:
          - name: all_inputs
            feature_indices:
              - 0
              - 1
            kernel:
              kernel_type: Matern52
              ard: true
              lengthscale_prior:
                distribution: LogNormal
                params:
                  loc: 0.0
                  scale: 0.4
              outputscale_prior:
                distribution: Gamma
                params:
                  concentration: 2.0
                  rate: 1.0
        group_composition: additive
        noise:
          fixed: false
          prior:
            distribution: Gamma
            params:
              concentration: 2.0
              rate: 5.0
        execution:
          input_scaling: true
          outcome_standardization: true

  translation_rules:
    - trigger_phrases:
        - seasonal behavior
        - seasonality
        - repeating cycle
        - weekly pattern
        - monthly pattern
        - annual cycle
        - periodic signal
        - cyclical behavior
      interpretation:
        primary_structure: periodic latent component
        secondary_structure: often needs smooth envelope or residual component
      recommended_components:
        model_family:
          preferred: SingleTaskGP
          alternatives:
            - MultiTaskGP
            - ModelListGP
        mean:
          default: Constant
        kernels:
          primary:
            - kernel_type: Periodic
              period_length: infer_or_specify
          optional:
            - kernel_type: RBF
            - kernel_type: Matern52
        composition_patterns:
          - Periodic x RBF
          - Periodic + RBF
        execution:
          input_scaling: true
          outcome_standardization: true
      disqualifiers:
        - no explicit time, phase, or cycle index
        - one-off event mistaken for recurrence
        - changing period with no stable cycle support
        - abrupt regime switching dominates over repetition
      follow_up_questions:
        - what variable encodes time or phase?
        - what period is expected or observed?
        - is the cycle stable or drifting?
        - do you expect a trend in addition to seasonality?

    - trigger_phrases:
        - correlated outputs
        - outputs move together
        - tasks are related
        - different machines behave similarly
        - products share dynamics
        - multiple related targets
        - shared behavior across outputs
      interpretation:
        primary_structure: cross-output dependence may justify multitask sharing
        secondary_structure: decide whether shared latent structure is stronger than independent fits
      recommended_components:
        model_family:
          preferred: MultiTaskGP
          alternatives:
            - ModelListGP
            - independent_multi_output
        mean:
          default: Constant
          optional:
            - task_specific_means
        kernels:
          primary:
            - kernel_type: Matern52
          optional:
            - kernel_type: RBF
        multitask:
          required_for_preferred:
            - task_feature_index
            - task_values
            - multitask_rank
        execution:
          input_scaling: true
          outcome_standardization: true
      disqualifiers:
        - outputs are semantically unrelated
        - no task indicator or long-format representation available
        - outputs do not share input support
        - observed correlation disappears after conditioning on inputs
      follow_up_questions:
        - are all outputs measured on the same inputs or aligned conditions?
        - do you have a task indicator column?
        - do you expect shared mechanism or merely coincidental co-movement?
        - is borrowing strength important because some tasks are data-poor?

    - trigger_phrases:
        - small data
        - limited data
        - few observations
        - sparse observations
        - high uncertainty
        - low sample size
        - not much training data
      interpretation:
        primary_structure: conservative exact GP with informative priors and low-complexity kernel
        secondary_structure: avoid unnecessary output coupling or highly flexible kernels unless strongly justified
      recommended_components:
        model_family:
          preferred: SingleTaskGP
          alternatives:
            - MultiTaskGP
        mean:
          default: Constant
          optional:
            - Linear
        kernels:
          primary:
            - kernel_type: RBF
            - kernel_type: Matern52
          avoid_by_default:
            - SpectralMixture
            - high-complexity compositions
        priors:
          preferred:
            - lengthscale_prior
            - outputscale_prior
            - noise.prior
        execution:
          input_scaling: true
          outcome_standardization: true
      disqualifiers:
        - no defensible prior information and very high-dimensional inputs
        - process is clearly discontinuous or regime-driven
        - user requests highly expressive kernel without enough evidence
      follow_up_questions:
        - how many observations and input dimensions do you have?
        - what prior knowledge do you have about smoothness or noise?
        - is conservative interpolation more important than capturing fine detail?
        - are outputs single-target or related tasks?

    - trigger_phrases:
        - regime change
        - structural break
        - sudden shift
        - abrupt transition
        - phase change
        - breakpoint
        - before and after behavior differs
      interpretation:
        primary_structure: standard stationary exact GP kernels are likely misspecified
        secondary_structure: if forced into current GPArchitect contract, use rougher residual kernel plus explicit trend partitioning only as fallback
      recommended_components:
        model_family:
          preferred: SingleTaskGP
          alternatives:
            - ModelListGP
        mean:
          default: Constant
          optional:
            - Linear
        kernels:
          conservative_fallback:
            - kernel_type: Matern12
            - kernel_type: Matern32
        composition_patterns:
          - separate_models_if_regimes_can_be_segmented
          - additive_blocks_only_if_regime_covariate_is_explicit
        execution:
          input_scaling: true
          outcome_standardization: true
        routing_note:
          preferred_action: segment_data_or_represent_regime_explicitly_before_GP_fit
      disqualifiers:
        - no regime indicator and transition is dominant
        - user expects a stationary kernel to explain a discontinuity directly
        - abrupt jump is sharper than Matern roughness can plausibly absorb
      follow_up_questions:
        - do you know the regime boundary or indicator variable?
        - should regimes be modeled separately?
        - is the change abrupt or gradual?
        - do you need interpolation across the break or separate behavior on each side?

    - trigger_phrases:
        - monotonic trend
        - increasing trend
        - decreasing trend
        - upward drift
        - downward drift
        - overall growth
        - overall decline
      interpretation:
        primary_structure: deterministic mean trend should be separated from residual covariance
        secondary_structure: smooth kernel should model departures around trend, not absorb the entire slope
      recommended_components:
        model_family:
          preferred: SingleTaskGP
          alternatives:
            - MultiTaskGP
            - ModelListGP
        mean:
          preferred: Linear
          alternatives:
            - Constant
        kernels:
          primary:
            - kernel_type: RBF
            - kernel_type: Matern52
        composition_patterns:
          - linear_mean + smooth_residual_kernel
        execution:
          input_scaling: true
          outcome_standardization: true
      disqualifiers:
        - trend is nonlinear with obvious curvature not captured by linear mean
        - abrupt structural breaks dominate
        - monotonicity is only local and not global
      follow_up_questions:
        - is the trend approximately linear over the modeled range?
        - which covariate carries the trend?
        - do residuals still show seasonality or local structure?
        - do you need strict monotonicity or just an overall directional trend?

    - trigger_phrases:
        - noisy observations
        - high measurement noise
        - sensors are noisy
        - observations are unreliable
        - variance in measurements
        - heteroskedastic noise
        - label noise
      interpretation:
        primary_structure: likelihood/noise model needs explicit attention
        secondary_structure: current GPArchitect contract supports Gaussian exact-regression noise with optional fixed value or prior
      recommended_components:
        model_family:
          preferred: SingleTaskGP
          alternatives:
            - MultiTaskGP
            - ModelListGP
        noise:
          default:
            fixed: false
          optional:
            - noise.prior
            - fixed_noise_if_known
        kernels:
          default:
            - kernel_type: Matern52
            - kernel_type: RBF
        means:
          default: Constant
        execution:
          input_scaling: true
          outcome_standardization: true
        routing_note:
          if_noise_differs_by_task: consider MultiTaskGP only if coupling is justified
      disqualifiers:
        - non-Gaussian observation model is required
        - noise is strongly input-dependent and contract cannot represent heteroskedastic likelihood directly
        - outliers dominate and Gaussian noise assumption is poor
      follow_up_questions:
        - is the noise level known, learnable, or varying by region?
        - are there outliers or heavy tails?
        - is the noise shared across tasks or task-specific?
        - do you have replicate measurements to estimate noise directly?

    - trigger_phrases:
        - smooth relationship
        - gradual variation
        - continuous effect
        - nearby points should be similar
      interpretation:
        primary_structure: stationary smooth covariance
        secondary_structure: decide between very smooth and moderately smooth kernel
      recommended_components:
        model_family:
          preferred: SingleTaskGP
          alternatives:
            - MultiTaskGP
            - ModelListGP
        kernels:
          preferred:
            - kernel_type: RBF
          alternatives:
            - kernel_type: Matern52
        means:
          default: Constant
          optional:
            - Linear
        execution:
          input_scaling: true
          outcome_standardization: true
      disqualifiers:
        - kinks, cusps, or discontinuities are visible
        - periodicity is dominant
        - strong trend is present but mean term omitted
      follow_up_questions:
        - do you expect very smooth behavior or some local roughness?
        - is there also a global trend?
        - are there known periodic effects?
        - should features have separate lengthscales?

    - trigger_phrases:
        - rough function
        - irregular local behavior
        - non-smooth surface
        - sharp local changes
        - kinks
      interpretation:
        primary_structure: rougher stationary kernel than RBF
        secondary_structure: choose lower-smoothness Matern before escalating complexity
      recommended_components:
        model_family:
          preferred: SingleTaskGP
          alternatives:
            - MultiTaskGP
        kernels:
          preferred:
            - kernel_type: Matern12
          alternatives:
            - kernel_type: Matern32
        means:
          default: Constant
        execution:
          input_scaling: true
          outcome_standardization: true
      disqualifiers:
        - true discontinuity rather than rough continuity
        - clear periodicity dominates
        - deterministic trend omitted from mean
      follow_up_questions:
        - are changes continuous but rough, or actually discontinuous?
        - are local spikes measurement noise or real signal?
        - do you need separate regime models?
        - is roughness shared across all input dimensions?

    - trigger_phrases:
        - varying length scales
        - multi-scale behavior
        - both long-term and short-term variation
        - broad trend with local deviations
        - scale mixture behavior
      interpretation:
        primary_structure: multiple smoothness scales in one latent function
        secondary_structure: RQ or additive decomposition are candidates
      recommended_components:
        model_family:
          preferred: SingleTaskGP
          alternatives:
            - ModelListGP
        kernels:
          preferred:
            - kernel_type: RQ
          alternatives:
            - additive RBF blocks
            - additive Matern + RBF
        means:
          default: Constant
          optional:
            - Linear
        execution:
          input_scaling: true
          outcome_standardization: true
      disqualifiers:
        - multi-scale claim is unsupported by data
        - dominant periodicity is misread as multi-scale smoothness
        - too little data for flexible scale mixture behavior
      follow_up_questions:
        - do you see nested short- and long-range variation in the same target?
        - would separate additive processes be more interpretable than a single RQ kernel?
        - is data volume sufficient for extra flexibility?
        - is there also periodic structure?

    - trigger_phrases:
        - independent drivers
        - separate mechanisms
        - different feature blocks
        - macro and local effects
        - additive effects
        - contributions add up
      interpretation:
        primary_structure: feature-group decomposition with additive composition
        secondary_structure: allow different kernels per block
      recommended_components:
        model_family:
          preferred: SingleTaskGP
          alternatives:
            - ModelListGP
        feature_groups:
          required: true
        composition:
          preferred: additive
        kernels:
          per_group:
            - choose_by_block_smoothness
        means:
          default: Constant
        execution:
          input_scaling: true
          outcome_standardization: true
      disqualifiers:
        - dominant multiplicative interaction between blocks
        - no defensible partition of inputs
        - user expects one shared latent mechanism across all features
      follow_up_questions:
        - which inputs belong to each mechanism?
        - do the blocks interact or mostly contribute independently?
        - should blocks have different smoothness assumptions?
        - is interpretability by component important?

    - trigger_phrases:
        - interaction effect
        - variables interact
        - effect depends on another variable
        - combined effect
        - cross-term behavior
      interpretation:
        primary_structure: multiplicative or hierarchical kernel composition
        secondary_structure: interaction should not be represented as purely additive blocks
      recommended_components:
        model_family:
          preferred: SingleTaskGP
          alternatives:
            - MultiTaskGP
        composition:
          preferred:
            - multiplicative
            - hierarchical
        kernels:
          candidates:
            - RBF x RBF
            - Matern x Matern
            - group-level hierarchical composition
        means:
          default: Constant
        execution:
          input_scaling: true
          outcome_standardization: true
      disqualifiers:
        - no evidence of interaction
        - limited data makes interaction estimation unstable
        - additive decomposition already explains variation sufficiently
      follow_up_questions:
        - which variables interact?
        - is the interaction global or only in certain regions?
        - do you need main effects plus interaction, or interaction only?
        - is there enough data to estimate cross-effects?

    - trigger_phrases:
        - each output should be modeled separately
        - outputs have different feature relevance
        - outputs are independent
        - separate models per target
        - no shared correlation across outputs
      interpretation:
        primary_structure: independent exact GP per output
        secondary_structure: use ModelListGP if one BoTorch container is desired
      recommended_components:
        model_family:
          preferred: ModelListGP
          alternatives:
            - independent_multi_output
        means:
          optional:
            - output_specific_means
        kernels:
          per_output:
            - choose independently
        execution:
          input_scaling: true
          outcome_standardization: true
      disqualifiers:
        - meaningful output correlation is expected
        - user wants strength sharing across sparse tasks
        - outputs naturally fit long-format multitask representation
      follow_up_questions:
        - do outputs share any mechanism worth modeling jointly?
        - should each output use the same inputs?
        - do outputs need different means or kernels?
        - do you want one container model or fully separate training workflows?

validation_report:
  missing_elements:
    - no object exists yet for Uniform prior
    - no object exists yet for Polynomial kernel
    - no object exists yet for SpectralMixture kernel
    - no object exists yet for InfiniteWidthBNN kernel
    - no object exists yet for ExponentialDecay kernel
    - no standalone object exists for independent_multi_output as a non-ModelList workflow artifact
    - kernel objects do not yet cover explicit outputscale_prior wrapper behavior as its own reusable object
  weak_sections:
    - regime_change translation rule is only a fallback because current GPArchitect contract lacks explicit changepoint kernels
    - noise handling is limited to Gaussian exact-regression noise; heteroskedastic and non-Gaussian cases are routed away rather than modeled
    - decision graph contains both ModelListGP and independent_multi_output endpoints, but only ModelListGP is directly represented as a GPArchitect model_class
    - prior object guidance for Normal prior on positive constrained hyperparameters is weaker than LogNormal/Gamma guidance
    - composition templates cover direct instantiation for required templates only; broader library templates are not yet enumerated
  ambiguity_risks:
    - monotonic trend language may imply strict monotonic constraints, but current contract only supports Linear mean, not constrained monotonic GP priors
    - correlated outputs language may reflect common inputs rather than true residual cross-output coupling
    - seasonal behavior may be confused with autocorrelation or sparse repeated events if time support is weak
    - small data does not specify whether low n, high d, or sparse per-task regime is dominant
    - additive versus multiplicative composition often cannot be resolved from language alone without follow-up questions
    - MultiTaskGP applicability depends on long-format task encoding and explicit task_values; users may describe correlated outputs without having this representation