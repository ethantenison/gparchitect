final_knowledge_base:
  objects:
    - object_type: kernel
      canonical_name: RBF
      aliases:
        - SquaredExponential
        - GaussianKernel
        - SE
      implementation_mapping:
        gpytorch_class: gpytorch.kernels.RBFKernel
        botorch_usage:
          - covar_module for SingleTaskGP
          - covar_module for independent submodels inside ModelListGP
          - data_covar_module for MultiTaskGP
        gparchitect_schema_mapping:
          kernel_type: RBF
          schema_fields:
            required:
              - kernel_type
            optional:
              - ard
              - lengthscale_prior
              - outputscale_prior
              - composition
              - children
      required_args:
        - kernel_type=RBF
      optional_args:
        - ard
        - lengthscale_prior
        - outputscale_prior
      supported_contexts:
        SingleTaskGP: supported
        MultiTaskGP: supported
        independent_multi_output: supported
        batched_models: supported
        ModelListGP: supported
      composition_compatibility:
        - additive
        - multiplicative
        - hierarchical
        - none
      mathematical_role:
        - stationary covariance
        - infinitely differentiable smoothness prior
        - distance-based similarity with exponential quadratic decay
      modeling_assumptions:
        - latent function is very smooth
        - nearby inputs should have rapidly increasing covariance as distance shrinks
        - stationarity is acceptable
        - no abrupt local roughness dominates
      observable_evidence_for_use:
        data_patterns:
          - smooth response curves
          - stable interpolation between nearby points
          - no visible cusps or sharp kinks
        domain_language_cues:
          - smooth relationship
          - gradual change
          - slowly varying surface
        experimental_signals:
          - dense sampling over continuous covariates
          - standardized inputs with moderate signal-to-noise ratio
        example_user_statements:
          - "the response changes smoothly with temperature"
          - "adjacent dates should behave similarly without abrupt jumps"
      exclusion_rules:
        anti_patterns:
          - sharp regime changes
          - rough local behavior
          - discontinuities
          - clear multi-scale structure handled better by RQ or additive kernels
        invalid_conditions:
          - nonstationary trend dominates and no mean/trend term included
          - periodic structure is primary signal
        diagnostic_failures:
          - over-smoothing peaks or troughs
          - posterior mean misses local variation while intervals remain narrow
          - learned lengthscale collapses to very small values to compensate for roughness
      hyperparameter_semantics:
        - parameter: lengthscale
          meaning: characteristic distance over which correlation decays
          effect_if_increased: smoother function, longer-range dependence, less local adaptation
          effect_if_decreased: more local variation, faster covariance decay, risk of fitting noise
        - parameter: outputscale
          meaning: marginal signal variance
          effect_if_increased: larger function amplitude and posterior variance
          effect_if_decreased: flatter latent function with more variation attributed to noise
        - parameter: ard
          meaning: separate lengthscale per active input dimension
          effect_if_increased: more feature-specific flexibility and relevance separation
          effect_if_decreased: shared smoothness assumption across dimensions
      interaction_effects:
        kernels:
          - periodic_times_rbf yields smooth repeating structure
          - additive_with_linear separates global trend from local smooth residual
        means:
          - constant mean suitable when level offset exists
          - linear mean reduces misuse of RBF for deterministic trend
        priors:
          - informative lengthscale prior is valuable in low-data smooth domains
        multitask:
          - task correlation can share smooth structure across tasks in MultiTaskGP
        normalization:
          - strong dependence on normalized inputs for interpretable lengthscale
      composition_patterns:
        - pattern: additive_rbf_blocks
          description: separate smooth effects by feature group
          when_to_use:
            - semantically distinct smooth covariate blocks
          when_not_to_use:
            - dominant cross-feature interaction is required
        - pattern: periodic_times_rbf
          description: smooth seasonal structure with slowly varying within-cycle behavior
          when_to_use:
            - recurring cycles with smooth deviations
          when_not_to_use:
            - no repeated period evidence
      model_routing_implications:
        suggests:
          - SingleTaskGP
          - ModelListGP
          - MultiTaskGP
        why:
          - kernel choice is agnostic to family and primarily encodes within-input smoothness
        constraints:
          - for MultiTaskGP requires explicit task column and task_values in GPArchitect
      diagnostics_and_revision_rules:
        checks:
          - compare residual autocorrelation after fit
          - inspect fitted lengthscale relative to scaled input range
          - compare NLPD/MSLL against Matern52 baseline
        failure_symptoms:
          - persistent structured residuals
          - poor uncertainty calibration around local structure
          - excessive smoothness in posterior samples
        fixes:
          - switch to Matern32 or Matern12 for rougher latent functions
          - add linear mean if trend is being absorbed by kernel
          - use additive decomposition if multiple mechanisms are present
      decision_triggers:
        IF THEN:
          - IF domain says smooth gradual variation AND no stronger periodic or discontinuous evidence THEN consider RBF
          - IF residuals after linear mean remain smooth THEN prefer RBF over rougher Matern
        counterfactual_checks:
          - IF replacing RBF with Matern32 materially improves predictive density THEN RBF smoothness assumption was too strong
          - IF adding periodic term materially improves fit THEN pure RBF was incomplete
      evidence_strength:
        theoretical: strong
        empirical_library_support: strong
        heuristic_elements:
          - choosing RBF over Matern52 from language alone is heuristic until residual diagnostics confirm
      citations:
        - https://gaussianprocess.org/gpml/chapters/RW.pdf
        - https://docs.gpytorch.ai/en/stable/kernels.html
        - https://github.com/ethantenison/gparchitect/
      concise_agent_summary:
        - use for very smooth stationary functions
        - reject when discontinuity, roughness, or dominant periodicity is present
      schema_ready_example:
        kernel_type: RBF
        ard: true
        lengthscale_prior:
          distribution: LogNormal
          params:
            loc: 0.0
            scale: 0.5

    - object_type: kernel
      canonical_name: Matern52
      aliases:
        - Matern_nu_2p5
      implementation_mapping:
        gpytorch_class: gpytorch.kernels.MaternKernel(nu=2.5)
        botorch_usage:
          - covar_module for SingleTaskGP
          - covar_module for independent submodels inside ModelListGP
          - data_covar_module for MultiTaskGP
        gparchitect_schema_mapping:
          kernel_type: Matern52
          schema_fields:
            required:
              - kernel_type
            optional:
              - ard
              - lengthscale_prior
              - outputscale_prior
              - composition
              - children
      required_args:
        - kernel_type=Matern52
      optional_args:
        - ard
        - lengthscale_prior
        - outputscale_prior
      supported_contexts:
        SingleTaskGP: supported
        MultiTaskGP: supported
        independent_multi_output: supported
        ModelListGP: supported
      composition_compatibility:
        - additive
        - multiplicative
        - hierarchical
        - none
      mathematical_role:
        - stationary covariance
        - moderately smooth latent prior
        - rougher alternative to RBF
      modeling_assumptions:
        - latent function is smooth but not infinitely differentiable
        - stationarity is acceptable
        - local irregularity may exist without true discontinuity
      observable_evidence_for_use:
        data_patterns:
          - smooth signal with occasional sharper local bends
          - RBF baseline appears slightly over-smoothed
        domain_language_cues:
          - smooth but flexible
          - not perfectly smooth
          - moderate local variation
        experimental_signals:
          - medium data regime
          - exact smoothness unknown
        example_user_statements:
          - "the response is smooth overall but can bend locally"
          - "I want a safer default than the squared exponential"
      exclusion_rules:
        anti_patterns:
          - true periodicity as dominant mechanism
          - abrupt discontinuities
          - extremely smooth physical law with dense data favoring RBF
        invalid_conditions:
          - strong deterministic trend omitted from mean
        diagnostic_failures:
          - residuals still show underfit local variation
          - posterior remains too smooth at sharp transitions
      hyperparameter_semantics:
        - parameter: lengthscale
          meaning: correlation decay scale
          effect_if_increased: smoother posterior, broader sharing
          effect_if_decreased: more local flexibility, higher noise-fitting risk
        - parameter: outputscale
          meaning: signal variance
          effect_if_increased: larger latent amplitude
          effect_if_decreased: flatter latent function
        - parameter: ard
          meaning: per-dimension lengthscales
          effect_if_increased: variable-specific smoothness
          effect_if_decreased: shared smoothness across active dimensions
      interaction_effects:
        kernels:
          - additive with linear mean handles trend plus residual
          - multiplicative composition captures smooth interactions
        means:
          - constant mean for centered targets
          - linear mean when directional drift exists
        priors:
          - useful low-data default with informative lengthscale prior
        multitask:
          - reasonable shared kernel for correlated tasks
        normalization:
          - input scaling required for interpretable lengthscales
      composition_patterns:
        - pattern: linear_plus_matern52
          description: global trend with flexible residual smoothness
          when_to_use:
            - monotonic or directional baseline plus local departures
          when_not_to_use:
            - no trend component
        - pattern: additive_feature_blocks
          description: independent mechanisms across blocks
          when_to_use:
            - separable feature groups
          when_not_to_use:
            - dominant interaction effect
      model_routing_implications:
        suggests:
          - SingleTaskGP
          - ModelListGP
          - MultiTaskGP
        why:
          - safe default stationary kernel across exact GP families
        constraints:
          - MultiTaskGP still requires long-format task setup
      diagnostics_and_revision_rules:
        checks:
          - compare predictive density against RBF and Matern32
          - inspect residual roughness
          - inspect learned lengthscales for collapse
        failure_symptoms:
          - still over-smooths local transitions
          - underfits repeating structure
        fixes:
          - move to Matern32 or Matern12 for rougher residuals
          - add periodic kernel when cycles exist
          - add linear mean for omitted trend
      decision_triggers:
        IF THEN:
          - IF smoothness is expected but infinite differentiability is too strong THEN prefer Matern52
          - IF no strong evidence separates RBF from rougher Matern options THEN default to Matern52
        counterfactual_checks:
          - IF RBF clearly improves predictive density without calibration loss THEN smoothness may be higher than assumed
          - IF Matern32 materially improves fit on local bends THEN Matern52 is still too smooth
      evidence_strength:
        theoretical: strong
        empirical_library_support: strong
        heuristic_elements:
          - using Matern52 as a default fallback is heuristic but common
      citations:
        - https://gaussianprocess.org/gpml/chapters/RW.pdf
        - https://docs.gpytorch.ai/en/stable/kernels.html
        - https://github.com/ethantenison/gparchitect/
      concise_agent_summary:
        - default stationary kernel when smoothness is uncertain
        - reject when discontinuity or dominant periodicity is primary
      schema_ready_example:
        kernel_type: Matern52
        ard: true

    - object_type: kernel
      canonical_name: Matern32
      aliases:
        - Matern_nu_1p5
      implementation_mapping:
        gpytorch_class: gpytorch.kernels.MaternKernel(nu=1.5)
        botorch_usage:
          - covar_module for SingleTaskGP
          - covar_module for ModelListGP submodels
          - data_covar_module for MultiTaskGP
        gparchitect_schema_mapping:
          kernel_type: Matern32
          schema_fields:
            required:
              - kernel_type
            optional:
              - ard
              - lengthscale_prior
              - outputscale_prior
      required_args:
        - kernel_type=Matern32
      optional_args:
        - ard
        - lengthscale_prior
        - outputscale_prior
      supported_contexts:
        SingleTaskGP: supported
        MultiTaskGP: supported
        independent_multi_output: supported
        ModelListGP: supported
      composition_compatibility:
        - additive
        - multiplicative
        - hierarchical
        - none
      mathematical_role:
        - stationary covariance
        - rougher smooth prior than Matern52
      modeling_assumptions:
        - function is continuous with noticeable local roughness
        - stationarity remains acceptable
      observable_evidence_for_use:
        data_patterns:
          - sharper turns than Matern52 can capture well
          - residuals still structured under smoother kernels
        domain_language_cues:
          - rough but continuous
          - irregular local behavior
        experimental_signals:
          - moderate sample density with local bends
        example_user_statements:
          - "there are sharper local changes but not hard jumps"
      exclusion_rules:
        anti_patterns:
          - true discontinuities
          - dominant periodic structure
          - extremely smooth physics-like relation
        invalid_conditions:
          - omitted deterministic trend
        diagnostic_failures:
          - still underfits sharp local behavior
          - uncertainty remains miscalibrated near transition regions
      hyperparameter_semantics:
        - parameter: lengthscale
          meaning: locality scale
          effect_if_increased: smoother posterior
          effect_if_decreased: more local variation
        - parameter: outputscale
          meaning: signal amplitude
          effect_if_increased: larger deviations
          effect_if_decreased: flatter latent response
        - parameter: ard
          meaning: per-feature roughness control
          effect_if_increased: separate local scales by feature
          effect_if_decreased: common scale
      interaction_effects:
        kernels:
          - useful in additive residual blocks
          - multiplicative use if interactions are smooth but rougher than RBF
        means:
          - pair with linear mean when trend exists
        priors:
          - informative lengthscale prior helpful in low-data roughness settings
        multitask:
          - can be shared across correlated tasks if roughness is common
        normalization:
          - scaled inputs improve comparability of learned local scales
      composition_patterns:
        - pattern: linear_plus_matern32
          description: directional baseline with rough residual
          when_to_use:
            - monotonic trend plus local irregularity
          when_not_to_use:
            - no trend
      model_routing_implications:
        suggests:
          - SingleTaskGP
          - MultiTaskGP
          - ModelListGP
        why:
          - kernel-level choice independent of family
        constraints:
          - exact family choice still depends on output coupling
      diagnostics_and_revision_rules:
        checks:
          - compare to Matern52 and Matern12 by NLPD/MSLL
          - inspect residual roughness
        failure_symptoms:
          - underfitting persists near steep local changes
          - posterior variance too narrow where signal turns abruptly
        fixes:
          - move to Matern12 for rougher process
          - segment regimes if changes are discontinuous
          - add periodic component if oscillation remains
      decision_triggers:
        IF THEN:
          - IF function appears rougher than Matern52 but continuous THEN choose Matern32
        counterfactual_checks:
          - IF Matern12 clearly improves calibration near local turns THEN Matern32 is still too smooth
          - IF Matern52 performs equally well with better stability THEN prefer smoother simpler prior
      evidence_strength:
        theoretical: strong
        empirical_library_support: strong
        heuristic_elements:
          - roughness assessment from language alone is heuristic
      citations:
        - https://gaussianprocess.org/gpml/chapters/RW.pdf
        - https://docs.gpytorch.ai/en/stable/kernels.html
        - https://github.com/ethantenison/gparchitect/
      concise_agent_summary:
        - use for continuous functions with noticeable local roughness
        - reject for discontinuities or dominant periodicity
      schema_ready_example:
        kernel_type: Matern32
        ard: true

    - object_type: kernel
      canonical_name: Matern12
      aliases:
        - ExponentialKernel
        - Matern_nu_0p5
      implementation_mapping:
        gpytorch_class: gpytorch.kernels.MaternKernel(nu=0.5)
        botorch_usage:
          - covar_module for SingleTaskGP
          - covar_module for ModelListGP submodels
          - data_covar_module for MultiTaskGP
        gparchitect_schema_mapping:
          kernel_type: Matern12
          schema_fields:
            required:
              - kernel_type
            optional:
              - ard
              - lengthscale_prior
              - outputscale_prior
      required_args:
        - kernel_type=Matern12
      optional_args:
        - ard
        - lengthscale_prior
        - outputscale_prior
      supported_contexts:
        SingleTaskGP: supported
        MultiTaskGP: supported
        independent_multi_output: supported
        ModelListGP: supported
      composition_compatibility:
        - additive
        - multiplicative
        - hierarchical
        - none
      mathematical_role:
        - stationary covariance
        - continuous but non-differentiable rough latent prior
      modeling_assumptions:
        - function may change sharply while remaining continuous
        - stationarity is acceptable
      observable_evidence_for_use:
        data_patterns:
          - frequent local kinks
          - smoother kernels underfit visibly
        domain_language_cues:
          - rough
          - jagged
          - sharp local changes
        experimental_signals:
          - repeated underfit under RBF and Matern52
        example_user_statements:
          - "the curve is continuous but pretty jagged"
      exclusion_rules:
        anti_patterns:
          - true discontinuities
          - periodic dominant signal
          - very smooth scientific relation
        invalid_conditions:
          - strong global trend omitted from mean
        diagnostic_failures:
          - still fails around actual change-points
          - learned very short lengthscale with unstable fit
      hyperparameter_semantics:
        - parameter: lengthscale
          meaning: locality radius under rough prior
          effect_if_increased: smoother, broader dependence
          effect_if_decreased: highly local roughness, stronger overfit risk
        - parameter: outputscale
          meaning: signal amplitude
          effect_if_increased: larger fluctuations
          effect_if_decreased: flatter latent variation
        - parameter: ard
          meaning: feature-specific roughness scales
          effect_if_increased: separate local scales per input
          effect_if_decreased: one shared local scale
      interaction_effects:
        kernels:
          - useful fallback for rough residual block
        means:
          - often pair with linear mean if drift exists
        priors:
          - strong lengthscale prior helpful to prevent noise mimicry
        multitask:
          - only if roughness shared and outputs correlated
        normalization:
          - essential because very small lengthscales can be unstable on unscaled inputs
      composition_patterns:
        - pattern: linear_plus_matern12
          description: trend plus rough residual
          when_to_use:
            - rough local deviations around global trend
          when_not_to_use:
            - discontinuous regime break
      model_routing_implications:
        suggests:
          - SingleTaskGP
          - MultiTaskGP
          - ModelListGP
        why:
          - roughness is kernel choice, not family choice
        constraints:
          - still exact Gaussian regression contract only
      diagnostics_and_revision_rules:
        checks:
          - compare against regime segmentation baseline
          - inspect posterior intervals near sharp changes
        failure_symptoms:
          - underfit at true change-points
          - unstable tiny lengthscales
        fixes:
          - segment regimes
          - introduce explicit regime covariate
          - move to separate models if structural break dominates
      decision_triggers:
        IF THEN:
          - IF continuity is plausible but differentiability is not THEN use Matern12
        counterfactual_checks:
          - IF piecewise modeling or segmentation improves sharply THEN kernel roughness was not the main issue
      evidence_strength:
        theoretical: strong
        empirical_library_support: strong
        heuristic_elements:
          - distinguishing rough continuity from discontinuity requires diagnostics
      citations:
        - https://gaussianprocess.org/gpml/chapters/RW.pdf
        - https://docs.gpytorch.ai/en/stable/kernels.html
        - https://github.com/ethantenison/gparchitect/
      concise_agent_summary:
        - rough continuous fallback
        - do not use as a substitute for true change-point modeling
      schema_ready_example:
        kernel_type: Matern12
        ard: true

    - object_type: kernel
      canonical_name: Periodic
      aliases:
        - ExpSineSquared_like
      implementation_mapping:
        gpytorch_class: gpytorch.kernels.PeriodicKernel
        botorch_usage:
          - covar_module for SingleTaskGP
          - covar_module for ModelListGP submodels
          - data_covar_module for MultiTaskGP
        gparchitect_schema_mapping:
          kernel_type: Periodic
          schema_fields:
            required:
              - kernel_type
            optional:
              - ard
              - lengthscale_prior
              - outputscale_prior
              - period_prior
              - period_length
      required_args:
        - kernel_type=Periodic
      optional_args:
        - ard
        - period_prior
        - period_length
        - lengthscale_prior
        - outputscale_prior
      supported_contexts:
        SingleTaskGP: supported
        MultiTaskGP: supported
        ModelListGP: supported
      composition_compatibility:
        - additive
        - multiplicative
        - hierarchical
        - none
      mathematical_role:
        - stationary periodic covariance
        - enforces repeating structure at fixed period
      modeling_assumptions:
        - latent behavior repeats with stable period
        - recurrence is stronger than one-off autocorrelation
      observable_evidence_for_use:
        data_patterns:
          - repeated peaks and troughs at regular intervals
          - autocorrelation peaks at fixed lag
        domain_language_cues:
          - seasonal
          - cyclic
          - weekly pattern
          - annual cycle
        experimental_signals:
          - explicit time or phase variable available
          - known calendar or machine cycle
        example_user_statements:
          - "there is weekly seasonality"
          - "behavior repeats every 12 months"
      exclusion_rules:
        anti_patterns:
          - quasi-periodic with drifting period and no smooth envelope term
          - one-off events misread as cycles
          - no time/phase variable
        invalid_conditions:
          - unknown or weakly identifiable period with sparse coverage
        diagnostic_failures:
          - learned period inconsistent across fits
          - residuals show trend or amplitude drift after fit
      hyperparameter_semantics:
        - parameter: period_length
          meaning: repeat interval
          effect_if_increased: longer cycle
          effect_if_decreased: shorter cycle
        - parameter: lengthscale
          meaning: smoothness within a cycle
          effect_if_increased: smoother repeating waveform
          effect_if_decreased: sharper within-cycle variation
        - parameter: outputscale
          meaning: amplitude of periodic component
          effect_if_increased: stronger oscillation
          effect_if_decreased: weaker oscillation
      interaction_effects:
        kernels:
          - Periodic x RBF captures smooth repeating patterns with local coherence
          - Periodic + RBF captures periodic plus nonperiodic residual structure
        means:
          - constant mean common
          - linear mean if trend coexists
        priors:
          - period prior useful when cycle known
        multitask:
          - shared periodic base can be coupled across tasks
        normalization:
          - period_length must correspond to scaled coordinate system if input scaling applied to time
      composition_patterns:
        - pattern: periodic_times_rbf
          description: locally smooth repeating pattern
          when_to_use:
            - stable cycle with smooth perturbation
          when_not_to_use:
            - no stable cycle
        - pattern: periodic_plus_trend
          description: repeating signal around deterministic drift
          when_to_use:
            - seasonality plus trend
          when_not_to_use:
            - no trend
      model_routing_implications:
        suggests:
          - SingleTaskGP
          - ModelListGP
          - MultiTaskGP
        why:
          - periodicity is within-output structure and does not determine output family
        constraints:
          - requires meaningful time/phase input
      diagnostics_and_revision_rules:
        checks:
          - verify learned period against known cycle
          - inspect residual autocorrelation after fit
          - compare additive vs multiplicative periodic compositions
        failure_symptoms:
          - unstable estimated period
          - residual drift or amplitude modulation
        fixes:
          - add RBF residual term
          - add linear mean for trend
          - remove periodic kernel if recurrence unsupported
      decision_triggers:
        IF THEN:
          - IF explicit recurring cycle is stated or observed THEN include Periodic kernel
        counterfactual_checks:
          - IF nonperiodic kernel matches or exceeds predictive density with simpler structure THEN periodicity claim is weak
      evidence_strength:
        theoretical: strong
        empirical_library_support: strong
        heuristic_elements:
          - inferring exact period from text without metadata is heuristic
      citations:
        - https://gaussianprocess.org/gpml/chapters/RW.pdf
        - https://docs.gpytorch.ai/en/stable/kernels.html
        - https://github.com/ethantenison/gparchitect/
      concise_agent_summary:
        - use only with stable repeat interval evidence
        - pair with RBF or mean term when trend or drift exists
      schema_ready_example:
        kernel_type: Periodic
        ard: false
        period_length: 12.0

    - object_type: kernel
      canonical_name: RQ
      aliases:
        - RationalQuadratic
        - scale_mixture_rbf
      implementation_mapping:
        gpytorch_class: gpytorch.kernels.RQKernel
        botorch_usage:
          - covar_module for SingleTaskGP
          - covar_module for ModelListGP submodels
          - data_covar_module for MultiTaskGP
        gparchitect_schema_mapping:
          kernel_type: RQ
          schema_fields:
            required:
              - kernel_type
            optional:
              - ard
              - rq_alpha
              - lengthscale_prior
              - outputscale_prior
      required_args:
        - kernel_type=RQ
      optional_args:
        - ard
        - rq_alpha
        - lengthscale_prior
        - outputscale_prior
      supported_contexts:
        SingleTaskGP: supported
        MultiTaskGP: supported
        ModelListGP: supported
      composition_compatibility:
        - additive
        - multiplicative
        - hierarchical
        - none
      mathematical_role:
        - stationary covariance
        - scale mixture of RBF-like behavior
      modeling_assumptions:
        - latent function may contain multiple characteristic smoothness scales
        - stationarity remains acceptable
      observable_evidence_for_use:
        data_patterns:
          - long-range trend-like variation plus local departures within same process
          - single-scale kernels alternate between oversmoothing and undersmoothing
        domain_language_cues:
          - multi-scale
          - long-term and short-term variation
          - varying length scales
        experimental_signals:
          - enough data to identify multiple scales
        example_user_statements:
          - "there is both slow drift and local wiggle"
      exclusion_rules:
        anti_patterns:
          - periodic recurrence misread as multi-scale smoothness
          - low-data setting with no evidence for added flexibility
        invalid_conditions:
          - dominant nonstationarity requiring mean structure
        diagnostic_failures:
          - alpha becomes weakly identified
          - no improvement over simpler RBF/Matern baselines
      hyperparameter_semantics:
        - parameter: lengthscale
          meaning: base locality scale
          effect_if_increased: smoother overall response
          effect_if_decreased: more local variation
        - parameter: rq_alpha
          meaning: controls heaviness of scale mixture
          effect_if_increased: approaches RBF-like behavior
          effect_if_decreased: stronger multi-scale behavior
        - parameter: outputscale
          meaning: signal variance
          effect_if_increased: larger amplitude
          effect_if_decreased: smaller amplitude
      interaction_effects:
        kernels:
          - alternative to explicit additive multi-scale decomposition
        means:
          - linear mean still needed when deterministic trend present
        priors:
          - alpha prior not exposed in GPArchitect; rq_alpha is initializer only
        multitask:
          - usable if shared multi-scale latent behavior across tasks
        normalization:
          - input scaling important to make lengthscale interpretable
      composition_patterns:
        - pattern: rq_single_process
          description: one kernel capturing mixed local/global scales
          when_to_use:
            - multi-scale latent structure without need for interpretable decomposition
          when_not_to_use:
