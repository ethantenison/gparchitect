        gparchitect_schema_mapping:
          model_class: SingleTaskGP
          schema_fields:
            required:
              - model_class
              - feature_groups
              - input_dim
              - output_dim
            optional:
              - mean
              - noise
              - execution
              - group_composition
      required_args:
        - model_class=SingleTaskGP
      optional_args:
        - mean
        - noise
        - execution
        - group_composition
      supported_contexts:
        output_dim: single preferred
        multi_output: possible only via separate models, not as one SingleTaskGP object
      composition_compatibility:
        - all supported kernel compositions
      mathematical_role:
        - exact GP regression for a single target
      modeling_assumptions:
        - one output is modeled at a time
        - exact Gaussian regression likelihood is adequate
      observable_evidence_for_use:
        data_patterns:
          - single target variable
        domain_language_cues:
          - one response
          - one outcome
        experimental_signals:
          - no need for cross-output borrowing
        example_user_statements:
          - "predict one continuous target"
      exclusion_rules:
        anti_patterns:
          - multiple correlated outputs needing shared statistical strength
        invalid_conditions:
          - user expects one model object to capture cross-output covariance
        diagnostic_failures:
          - sparse related tasks remain poorly estimated despite known coupling
      hyperparameter_semantics:
        - parameter: outcome_standardization
          meaning: whether BoTorch standardizes target during fitting
          effect_if_increased: more stable exact GP fitting for scalar outputs
          effect_if_decreased: preserves raw-scale fitting
      interaction_effects:
        kernels:
          - supports any GPArchitect kernel/feature-group composition
        means:
          - supports shared mean
        priors:
          - supports GPArchitect prior placements
        multitask:
          - no cross-output covariance
        normalization:
          - input scaling and outcome standardization commonly enabled
      composition_patterns:
        - pattern: single_output_exact_gp
          description: default exact GP for one continuous target
          when_to_use:
            - one output
          when_not_to_use:
            - multiple outputs with desired shared strength
      model_routing_implications:
        suggests:
          - SingleTaskGP
        why:
          - minimal exact GP family for scalar response
        constraints:
          - no output coupling
      diagnostics_and_revision_rules:
        checks:
          - residual diagnostics
          - calibration metrics
          - ablate kernel/mean choices
        failure_symptoms:
          - structured residuals
          - poor calibration
        fixes:
          - revise kernel, mean, priors, or data preprocessing
      decision_triggers:
        IF THEN:
          - IF output_dim == 1 THEN choose SingleTaskGP unless exact contract is violated
        counterfactual_checks:
          - IF multiple related outputs exist and separate fits waste information THEN reconsider family and route to MultiTaskGP or ModelListGP
      evidence_strength:
        theoretical: strong
        empirical_library_support: strong
        heuristic_elements: []
      citations:
        - https://archive.botorch.org/v/0.8.3/api/models.html
        - https://github.com/ethantenison/gparchitect/
      concise_agent_summary:
